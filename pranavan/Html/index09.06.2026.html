<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Javascript</h2>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Voluptates, corporis autem in culpa hic impedit ullam dolorum? Sapiente, quaerat explicabo.</p>
    <script>
        var str = "AmAzing";
        document.write(str.toUpperCase());
        document.write("<br>");
        document.write(str.toLowerCase());
        document.write("<br>");
        document.write(str.startsWith("b"));
        document.write("<br>");
    </script>

    <h2>Javascript 2</h2>
    <p id="demo"></p>
    <script>
        var fruits = ["Banana", "Orange", "Apple", "Mango", "Kiwi"];
        var text = "";
        var i;
        for (i=0; i < fruits.length; i++) {
            text += fruits[i] + "<br>";
        }
        document.getElementById("demo").innerHTML = text;
    </script>

    <h2>Javascript 3</h2>
    <p id="demo"></p>
    <script>
        var day;
        switch (new Date().getDay()){
                case 0:
                day = "Sunday";
                break;
                case 1:
                day = "Monday";
                break;
                case 2:
                day = "Tuesday";
                break;
                case 3:
                day = "Wednesday";
                break;
                case 4:
                day = "Thursday";
                break;
                case 5:
                day = "Friday";
                break;
                case 6:
                day = "Saturday";
        }
        document.getElementById("demo").innerHTML = "Today is " + day;
    </script>
    
</body>
</html>
